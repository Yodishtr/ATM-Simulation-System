<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ATM Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
        }

        .login-card {
            width: min(420px, 92%);
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
            padding: 32px 28px;
        }

        .login-title {
            margin: 0 0 8px 0;
            text-align: center;
            font-size: 28px;
        }

        .login-subtitle {
            margin: 0 0 24px 0;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .message {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .message-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .message-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            padding: 11px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
        }

        .login-button {
            width: 100%;
            border: none;
            border-radius: 8px;
            padding: 12px 14px;
            background: #1f6feb;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
        }

        .login-button:hover {
            background: #1559c0;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1 class="login-title">ATM Login</h1>
    <p class="login-subtitle">Enter your card number and PIN to continue.</p>

    <div th:if="${param.error}" class="message message-error">
        Invalid card number or PIN.
    </div>

    <div th:if="${param.logout}" class="message message-success">
        You have been logged out.
    </div>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="form-group">
            <label for="username">Card Number</label>
            <input id="username"
                   name="username"
                   type="text"
                   placeholder="Enter your card number"
                   required>
        </div>

        <div class="form-group">
            <label for="password">PIN</label>
            <input id="password"
                   name="password"
                   type="password"
                   placeholder="Enter your PIN"
                   required>
        </div>

        <button type="submit" class="login-button">Login</button>
    </form>
</div>

</body>
</html>
